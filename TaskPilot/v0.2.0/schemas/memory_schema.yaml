# TaskPilot v0.2.0 — Long-Term Memory Schema
# PATTERN_002a: JSONL Event Store + PATTERN_025: Bi-Temporal Tracking
# Storage: orchestrator/run_events.jsonl (append-only)

memory:
  name: TaskPilotLongTermMemory
  version: "0.2.0"
  storage:
    format: jsonl
    path: orchestrator/run_events.jsonl
    mode: append_only
    retention: indefinite

  # Bi-temporal timestamps (from Zep PATTERN_025)
  temporal_model:
    event_timestamp: "When the event actually occurred (ISO 8601)"
    recorded_timestamp: "When the event was written to the log (ISO 8601)"
    note: >
      event_timestamp and recorded_timestamp may differ when events are
      batch-logged at end of phase rather than real-time.

  # Event types
  event_types:
    CYCLE_START:
      description: "Beginning of a new orchestrator cycle"
      required_fields: [cycle_id, version, priorities, timestamp]
      example:
        cycle_id: "CYCLE_20260310"
        version: "v0.2.0"
        priorities: ["fix_defect_detection", "refine_exit_criteria", "memory_system"]
        event_timestamp: "2026-03-10T00:00:00Z"
        recorded_timestamp: "2026-03-10T00:01:00Z"

    SKILL_EXEC:
      description: "A skill was executed (success, failure, or incomplete)"
      required_fields: [cycle_id, skill_id, role, status, exit_criteria_met, artifacts, duration_estimate]
      status_values: [SUCCESS, FAILURE, INCOMPLETE, SKIPPED]
      example:
        cycle_id: "CYCLE_20260310"
        skill_id: "SKILL_SEC_DATA_HANDLING"
        role: "ROLE_SEC"
        status: "SUCCESS"
        exit_criteria_met: ["pii_inventory", "key_lifecycle", "re_encryption", "keychain_audit"]
        exit_criteria_missed: []
        artifacts: ["data_security_audit.md"]
        duration_estimate: "15min"

    KPI_MEASUREMENT:
      description: "KPI measured at end of test phase"
      required_fields: [cycle_id, version, kpi_name, value, threshold, status, detail]
      example:
        cycle_id: "CYCLE_20260310"
        kpi_name: "defect_detection_rate"
        value: 0.86
        threshold: 0.85
        status: "PASS"
        detail: "6/7 injected defects detected including SIM_006"

    BUG_FOUND:
      description: "Bug discovered during any phase"
      required_fields: [cycle_id, bug_id, severity, found_in_phase, description, status]
      status_values: [OPEN, FIXING, FIXED, DEFERRED]
      example:
        cycle_id: "CYCLE_20260310"
        bug_id: "BUG_20260310_001"
        severity: "P2"
        found_in_phase: "PHASE_6"
        description: "Orchestrator does not detect duplicate research topics"
        status: "OPEN"

    PATTERN_ADOPTED:
      description: "Research pattern was adopted and implemented"
      required_fields: [cycle_id, pattern_id, source, applies_to, expected_kpi_impact]
      example:
        cycle_id: "CYCLE_20260310"
        pattern_id: "PATTERN_002a"
        source: "CrewAI long-term memory"
        applies_to: "Memory system"
        expected_kpi_impact: "Reduce research duplication"

    PATTERN_REJECTED:
      description: "Research pattern was studied but not adopted"
      required_fields: [cycle_id, pattern_id, source, reason]
      example:
        cycle_id: "CYCLE_20260310"
        pattern_id: "PATTERN_ZEP_FULL_GRAPH"
        source: "Zep temporal knowledge graph"
        reason: "Over-engineering; bi-temporal timestamps sufficient for now"

    DOGFOOD_FINDING:
      description: "Finding from dogfood phase (app improvement or orchestrator issue)"
      required_fields: [cycle_id, finding_type, description, orchestrator_skill, target_app]
      finding_type_values: [APP_IMPROVEMENT, ORCHESTRATOR_BUG, ORCHESTRATOR_GAP]
      example:
        cycle_id: "CYCLE_20260310"
        finding_type: "APP_IMPROVEMENT"
        description: "HealthKit mock protocol needed for integration tests"
        orchestrator_skill: "SKILL_SDE_TEST_SCAFFOLDING"
        target_app: "Apple-watch"

    CYCLE_END:
      description: "End of orchestrator cycle with summary"
      required_fields: [cycle_id, version, verdict, overall_score, lessons, next_priorities]
      example:
        cycle_id: "CYCLE_20260310"
        version: "v0.2.0"
        verdict: "PROMOTED"
        overall_score: 0.87
        lessons: ["SEC crypto skills effective after refinement", "Memory system enables cycle-over-cycle learning"]
        next_priorities: ["MCP integration", "guardrail automation"]

  # Query patterns (for ASSESS phase memory consultation)
  query_patterns:
    previous_cycle_results:
      description: "What happened in the last N cycles?"
      filter: "event_type IN (CYCLE_START, CYCLE_END, KPI_MEASUREMENT)"
      sort: "event_timestamp DESC"
      limit: 50

    skill_performance_history:
      description: "How has a specific skill performed across cycles?"
      filter: "event_type = SKILL_EXEC AND skill_id = ?"
      sort: "event_timestamp DESC"

    bug_trend:
      description: "What bugs have been found and what's their resolution status?"
      filter: "event_type = BUG_FOUND"
      sort: "severity ASC, event_timestamp DESC"

    research_history:
      description: "What patterns have been adopted or rejected?"
      filter: "event_type IN (PATTERN_ADOPTED, PATTERN_REJECTED)"
      sort: "event_timestamp DESC"

    dogfood_findings:
      description: "What has dogfooding revealed about the orchestrator?"
      filter: "event_type = DOGFOOD_FINDING"
      sort: "event_timestamp DESC"
