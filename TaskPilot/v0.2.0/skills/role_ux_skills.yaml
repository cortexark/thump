# TaskPilot v0.1.0 — UX Engineer (ROLE_UX) Skills
# 5 skills covering design system through accessibility

skills:
  - skill_id: SKILL_UX_DESIGN_SYSTEM
    role: ROLE_UX
    description: >
      Define or evaluate the design system including typography, color,
      spacing, iconography, and component library.
    prerequisites:
      - Product scope defined
      - Target platform(s) identified
    evidence_required:
      - Design system document with tokens
      - Component library specification
      - Platform-specific guidelines compliance
    artifacts_produced:
      - design_system.md
      - component_spec.md
    scoring_rubric:
      consistency: "All components follow the same token system"
      platform_compliance: "Follows HIG/Material Design guidelines"
      scalability: "System supports dark mode, dynamic type, RTL"
    anti_patterns:
      - Hardcoded colors instead of tokens
      - Ignoring platform guidelines
      - No dark mode support
    test_hooks:
      - Verify design tokens exist for color, type, spacing
      - Check platform guideline compliance
    exit_criteria:
      - Design tokens defined for color, typography, spacing
      - Component library covers all required UI elements
      - Platform guidelines compliance documented
      - Dynamic type and dark mode addressed
      - SDE reviewed for implementation feasibility

  - skill_id: SKILL_UX_USER_FLOWS
    role: ROLE_UX
    description: >
      Map critical user flows from entry to completion, identifying
      friction points and optimization opportunities.
    prerequisites:
      - Feature requirements available
      - User personas defined
    evidence_required:
      - User flow diagrams for critical paths
      - Friction point analysis
      - Recommended improvements
    artifacts_produced:
      - user_flows.md
    scoring_rubric:
      coverage: "All critical paths mapped"
      detail: "Each step has success/failure branches"
      empathy: "Friction analysis considers user context"
    anti_patterns:
      - Happy-path only flows
      - No error state design
      - Ignoring onboarding flow
    test_hooks:
      - Verify critical paths have failure branches
      - Check onboarding flow exists
    exit_criteria:
      - All critical user flows mapped with success/failure branches
      - Friction points identified and prioritized
      - Improvement recommendations for top friction points
      - PM reviewed for alignment with business goals

  - skill_id: SKILL_UX_ACCESSIBILITY
    role: ROLE_UX
    description: >
      Audit accessibility compliance and produce recommendations for
      WCAG 2.1 AA conformance and platform-specific a11y features.
    prerequisites:
      - UI designs or implementation available
    evidence_required:
      - Accessibility audit report
      - WCAG conformance checklist
      - VoiceOver/TalkBack testing results
    artifacts_produced:
      - accessibility_audit.md
    scoring_rubric:
      coverage: "All screens audited"
      conformance: "WCAG 2.1 AA level assessed"
      platform: "VoiceOver + Dynamic Type tested"
    anti_patterns:
      - Skipping VoiceOver testing
      - Ignoring color contrast ratios
      - No Dynamic Type support
    test_hooks:
      - Verify all screens audited
      - Check color contrast ratios documented
    exit_criteria:
      - All screens audited for accessibility
      - WCAG 2.1 AA conformance status documented
      - VoiceOver flow tested for critical paths
      - Dynamic Type support verified
      - Remediation plan for non-conformant items

  - skill_id: SKILL_UX_COMPLICATION_DESIGN
    role: ROLE_UX
    description: >
      Design watchOS complications optimized for glanceability,
      information density, and consistent rendering across watch faces.
    prerequisites:
      - Watch feature requirements available
      - watchOS HIG reviewed
    evidence_required:
      - Complication design spec
      - Watch face compatibility matrix
      - Glanceability assessment
    artifacts_produced:
      - complication_design.md
    scoring_rubric:
      glanceability: "Key info visible in < 2 seconds"
      compatibility: "Works across circular, rectangular, and inline families"
      consistency: "Matches app design language"
    anti_patterns:
      - Too much information density
      - Only supporting one complication family
      - Inconsistent with phone app styling
    test_hooks:
      - Verify multiple complication families supported
      - Check glanceability assessment exists
    exit_criteria:
      - Complication designs for at least 3 watch face families
      - Glanceability assessment completed
      - Design consistent with iOS app design system
      - SDE reviewed for implementation constraints

  - skill_id: SKILL_UX_USABILITY_CHALLENGE
    role: ROLE_UX
    description: >
      Challenge PM and SDE proposals that would degrade usability,
      accessibility, or user experience consistency.
    prerequisites:
      - PM or SDE proposal to review
      - Design system available
    evidence_required:
      - Usability challenge with evidence
      - Alternative UX approaches
      - User impact assessment
    artifacts_produced:
      - ux_challenge.md
    scoring_rubric:
      evidence: "Challenges backed by UX data or guidelines"
      alternatives: "Better alternatives proposed"
      empathy: "User impact clearly articulated"
    anti_patterns:
      - Subjective preferences without guidelines backing
      - Blocking without alternatives
      - Ignoring technical constraints
    test_hooks:
      - Verify challenges reference design guidelines
      - Check alternatives proposed
    exit_criteria:
      - Every challenge references design guidelines or user data
      - Alternative approaches proposed
      - User impact assessment provided
      - Resolution accepted by proposing role
