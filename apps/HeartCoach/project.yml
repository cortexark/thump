name: Thump

############################################################
# Project-wide settings
############################################################

options:
  bundleIdPrefix: com.thump
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

############################################################
# Settings shared across targets
############################################################

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: true
    DEAD_CODE_STRIPPING: true
    CODE_SIGN_STYLE: Automatic

############################################################
# Swift Package Manager Dependencies
############################################################

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

############################################################
# Targets
############################################################

targets:

  # ----------------------------------------------------------
  # iOS App
  # ----------------------------------------------------------
  Thump:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS/
      - path: Shared/
    resources:
      - path: iOS/PrivacyInfo.xcprivacy
      - path: iOS/Assets.xcassets
      - path: iOS/GoogleService-Info.plist
        optional: true
      - path: iOS/Resources/RealUserSnapshots.json
        optional: true
    settings:
      base:
        INFOPLIST_FILE: iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: iOS/iOS.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.thump.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    dependencies:
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
      - sdk: StoreKit.framework
      - sdk: AppIntents.framework
      - sdk: AuthenticationServices.framework
      - package: Firebase
        product: FirebaseFirestore
    scheme:
      testTargets:
        - ThumpCoreTests
      gatherCoverageData: true

  # ----------------------------------------------------------
  # watchOS App
  # ----------------------------------------------------------
  ThumpWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Watch/
      - path: Shared/
    resources:
      - path: Watch/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Watch/Info.plist
        CODE_SIGN_ENTITLEMENTS: Watch/Watch.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.thump.ios.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    dependencies:
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
      - sdk: AppIntents.framework
    scheme:
      gatherCoverageData: true

  # ----------------------------------------------------------
  # Unit Tests
  # ----------------------------------------------------------
  ThumpCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/
        excludes:
          - "**/*.json"
          - "**/*.md"
          - "**/*.sh"
          # Dataset validation needs external CSV files — uncomment to skip:
          # - "Validation/DatasetValidationTests.swift"
          - "Validation/Data/**"
    dependencies:
      - target: Thump
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.thump.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Thump.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Thump"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # ----------------------------------------------------------
  # UI Tests (E2E)
  # ----------------------------------------------------------
  ThumpUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests/
    dependencies:
      - target: Thump
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.health.thump.uitests
        DEVELOPMENT_TEAM: RSF2UZJ4Y3
        TEST_TARGET_NAME: Thump

############################################################
# Schemes
############################################################

schemes:

  Thump:
    build:
      targets:
        Thump: all
        ThumpCoreTests: [test]
        ThumpUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - ThumpCoreTests
        - ThumpUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ThumpWatch:
    build:
      targets:
        ThumpWatch: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
