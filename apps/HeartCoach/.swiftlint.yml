# SwiftLint Configuration for Thump (HeartCoach)
# Project-specific rules aligned with the codebase conventions.

# Rules to opt-in to
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Rules to disable
disabled_rules:
  - trailing_whitespace       # Too noisy with auto-formatting
  - todo                      # TODOs are tracked in issue tracker
  - opening_brace             # Conflicts with project style for multi-line signatures
  - type_body_length          # Some view models legitimately need many properties
  - file_length               # Addressed by modularization over time
  - function_body_length      # Some engine functions are complex by design

# File exclusions
excluded:
  - Package.swift
  - .build
  - DerivedData

# Custom rule configuration
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - r
    - n
    - i

function_parameter_count:
  warning: 6
  error: 8

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level: 3
  function_level: 5

# Force unwrap is an error (not just warning) — critical for health app safety
force_unwrapping:
  severity: error

# Implicitly unwrapped optionals are a warning
implicitly_unwrapped_optional:
  severity: warning
  mode: all_except_iboutlets

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 15
  error: 25

# Ensure MARK comments are used for organization
mark:
  severity: warning

# Reporter for CI (GitHub Actions logging)
reporter: "xcode"
