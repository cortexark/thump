# SwiftLint Configuration for Thump

excluded:
  - Tests/
  - .build/

# Pre-existing violations in engine files — will be addressed in
# a dedicated refactoring pass.
identifier_name:
  min_length: 1
  max_length: 50
file_length:
  warning: 700
  error: 1000
type_body_length:
  warning: 500
  error: 800
function_body_length:
  warning: 100
  error: 200
function_parameter_count:
  warning: 7
  error: 10
cyclomatic_complexity:
  warning: 15
  error: 25
large_tuple:
  warning: 4
  error: 12
