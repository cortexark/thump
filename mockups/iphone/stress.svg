<svg xmlns="http://www.w3.org/2000/svg" width="393" height="852" viewBox="0 0 393 852">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, 'SF Pro Display', sans-serif; }
    </style>
    <linearGradient id="tabBarBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F8F8"/>
      <stop offset="100%" stop-color="#F2F2F2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="393" height="852" fill="#F2F2F7" rx="44"/>

  <!-- Dynamic Island -->
  <rect x="122" y="8" width="149" height="34" rx="17" fill="#000"/>

  <!-- Status Bar -->
  <text x="36" y="25" font-size="15" font-weight="600" fill="#000">9:41</text>
  <!-- Signal bars -->
  <g transform="translate(304,14)">
    <rect x="0" y="6" width="3" height="4" rx="1" fill="#000"/>
    <rect x="5" y="4" width="3" height="6" rx="1" fill="#000"/>
    <rect x="10" y="2" width="3" height="8" rx="1" fill="#000"/>
    <rect x="15" y="0" width="3" height="10" rx="1" fill="#000"/>
  </g>
  <!-- WiFi -->
  <g transform="translate(330,14)">
    <path d="M4 8a1 1 0 1 1 2 0 1 1 0 0 1-2 0" fill="#000"/>
    <path d="M1.5 5.5C3 4 7 4 8.5 5.5" stroke="#000" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M-0.5 3.5C2.5 1 7.5 1 10.5 3.5" stroke="#000" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Battery -->
  <rect x="352" y="15" width="24" height="11" rx="3" stroke="#000" stroke-width="1" fill="none"/>
  <rect x="376" y="19" width="2" height="4" rx="1" fill="#000"/>
  <rect x="354" y="17" width="18" height="7" rx="1.5" fill="#000"/>

  <!-- Large Title: Stress -->
  <text x="20" y="80" font-size="34" font-weight="700" fill="#000">Stress</text>

  <!-- View Mode Toggle -->
  <rect x="20" y="100" width="353" height="36" rx="9" fill="#E5E5EA"/>
  <rect x="22" y="102" width="115" height="32" rx="8" fill="#007AFF"/>
  <text x="79" y="123" font-size="13" font-weight="600" fill="#FFF" text-anchor="middle">Day</text>
  <text x="197" y="123" font-size="13" font-weight="500" fill="#666" text-anchor="middle">Week</text>
  <text x="314" y="123" font-size="13" font-weight="500" fill="#666" text-anchor="middle">Month</text>
  <!-- Annotation: Day -->
  <line x1="79" y1="138" x2="79" y2="150" stroke="#007AFF" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="30" y="152" width="100" height="18" rx="4" fill="#007AFF" opacity="0.1"/>
  <text x="80" y="164" font-size="9" fill="#007AFF" text-anchor="middle">switches view</text>

  <!-- Date Header -->
  <g transform="translate(0,155)">
    <text x="30" y="20" font-size="18" font-weight="600" fill="#007AFF">&lt;</text>
    <text x="197" y="20" font-size="16" font-weight="600" fill="#000" text-anchor="middle">Saturday, Mar 15</text>
    <text x="363" y="20" font-size="18" font-weight="600" fill="#007AFF">&gt;</text>
  </g>

  <!-- Day Heatmap: 6 columns x 4 rows = 24 hours -->
  <g transform="translate(40,195)">
    <!-- Row labels area -->
    <!-- Grid: 6 cols x 4 rows, box=44x28, gap=4 -->
    <!-- Hour 0 (12a) - Green --> <rect x="0" y="0" width="44" height="28" rx="4" fill="#22C55E"/>
    <!-- Hour 1 (1a) - Green -->  <rect x="48" y="0" width="44" height="28" rx="4" fill="#22C55E"/>
    <!-- Hour 2 (2a) - Green -->  <rect x="96" y="0" width="44" height="28" rx="4" fill="#22C55E"/>
    <!-- Hour 3 (3a) - Green -->  <rect x="144" y="0" width="44" height="28" rx="4" fill="#22C55E"/>
    <!-- Hour 4 (4a) - Green -->  <rect x="192" y="0" width="44" height="28" rx="4" fill="#22C55E"/>
    <!-- Hour 5 (5a) - Green -->  <rect x="240" y="0" width="44" height="28" rx="4" fill="#22C55E"/>

    <!-- Hour 6 (6a) - Amber -->  <rect x="0" y="36" width="44" height="28" rx="4" fill="#F59E0B"/>
    <!-- Hour 7 (7a) - Amber -->  <rect x="48" y="36" width="44" height="28" rx="4" fill="#F59E0B"/>
    <!-- Hour 8 (8a) - Red -->    <rect x="96" y="36" width="44" height="28" rx="4" fill="#EF4444"/>
    <!-- Hour 9 (9a) - Red -->    <rect x="144" y="36" width="44" height="28" rx="4" fill="#EF4444"/>
    <!-- Hour 10 (10a) - Red -->  <rect x="192" y="36" width="44" height="28" rx="4" fill="#EF4444"/>
    <!-- Hour 11 (11a) - Red -->  <rect x="240" y="36" width="44" height="28" rx="4" fill="#EF4444"/>

    <!-- Hour 12 (12p) - Red -->   <rect x="0" y="72" width="44" height="28" rx="4" fill="#EF4444"/>
    <!-- Hour 13 (1p) - Amber -->  <rect x="48" y="72" width="44" height="28" rx="4" fill="#F59E0B"/>
    <!-- Hour 14 (2p) - Amber -->  <rect x="96" y="72" width="44" height="28" rx="4" fill="#F59E0B"/>
    <!-- Hour 15 (3p) - Red -->    <rect x="144" y="72" width="44" height="28" rx="4" fill="#EF4444"/>
    <!-- Hour 16 (4p) - Red -->    <rect x="192" y="72" width="44" height="28" rx="4" fill="#EF4444"/>
    <!-- Hour 17 (5p) - Red -->    <rect x="240" y="72" width="44" height="28" rx="4" fill="#EF4444"/>

    <!-- Hour 18 (6p) - Red -->    <rect x="0" y="108" width="44" height="28" rx="4" fill="#EF4444"/>
    <!-- Hour 19 (7p) - Amber -->  <rect x="48" y="108" width="44" height="28" rx="4" fill="#F59E0B"/>
    <!-- Hour 20 (8p) - Amber -->  <rect x="96" y="108" width="44" height="28" rx="4" fill="#F59E0B"/>
    <!-- Hour 21 (9p) - Amber -->  <rect x="144" y="108" width="44" height="28" rx="4" fill="#F59E0B"/>
    <!-- Hour 22 (10p) - Green --> <rect x="192" y="108" width="44" height="28" rx="4" fill="#22C55E"/>
    <!-- Hour 23 (11p) - Green --> <rect x="240" y="108" width="44" height="28" rx="4" fill="#22C55E"/>

    <!-- Hour labels row 1 -->
    <text x="22" y="148" font-size="8" fill="#8E8E93" text-anchor="middle">12a</text>
    <text x="70" y="148" font-size="8" fill="#8E8E93" text-anchor="middle">1a</text>
    <text x="118" y="148" font-size="8" fill="#8E8E93" text-anchor="middle">2a</text>
    <text x="166" y="148" font-size="8" fill="#8E8E93" text-anchor="middle">3a</text>
    <text x="214" y="148" font-size="8" fill="#8E8E93" text-anchor="middle">4a</text>
    <text x="262" y="148" font-size="8" fill="#8E8E93" text-anchor="middle">5a</text>

    <!-- Hour labels row 2 -->
    <text x="22" y="180" font-size="8" fill="#8E8E93" text-anchor="middle">6a</text>
    <text x="70" y="180" font-size="8" fill="#8E8E93" text-anchor="middle">7a</text>
    <text x="118" y="180" font-size="8" fill="#8E8E93" text-anchor="middle">8a</text>
    <text x="166" y="180" font-size="8" fill="#8E8E93" text-anchor="middle">9a</text>
    <text x="214" y="180" font-size="8" fill="#8E8E93" text-anchor="middle">10a</text>
    <text x="262" y="180" font-size="8" fill="#8E8E93" text-anchor="middle">11a</text>

    <!-- Hour labels row 3 -->
    <text x="22" y="212" font-size="8" fill="#8E8E93" text-anchor="middle">12p</text>
    <text x="70" y="212" font-size="8" fill="#8E8E93" text-anchor="middle">1p</text>
    <text x="118" y="212" font-size="8" fill="#8E8E93" text-anchor="middle">2p</text>
    <text x="166" y="212" font-size="8" fill="#8E8E93" text-anchor="middle">3p</text>
    <text x="214" y="212" font-size="8" fill="#8E8E93" text-anchor="middle">4p</text>
    <text x="262" y="212" font-size="8" fill="#8E8E93" text-anchor="middle">5p</text>

    <!-- Hour labels row 4 -->
    <text x="22" y="244" font-size="8" fill="#8E8E93" text-anchor="middle">6p</text>
    <text x="70" y="244" font-size="8" fill="#8E8E93" text-anchor="middle">7p</text>
    <text x="118" y="244" font-size="8" fill="#8E8E93" text-anchor="middle">8p</text>
    <text x="166" y="244" font-size="8" fill="#8E8E93" text-anchor="middle">9p</text>
    <text x="214" y="244" font-size="8" fill="#8E8E93" text-anchor="middle">10p</text>
    <text x="262" y="244" font-size="8" fill="#8E8E93" text-anchor="middle">11p</text>
  </g>

  <!-- Trend Summary Banner -->
  <g transform="translate(20,460)">
    <rect width="353" height="56" rx="12" fill="#EF4444" fill-opacity="0.08" stroke="#EF4444" stroke-opacity="0.2" stroke-width="1"/>
    <text x="16" y="24" font-size="14" font-weight="600" fill="#DC2626">&#x2B06; Stress is trending up this week</text>
    <text x="16" y="42" font-size="12" fill="#8E8E93">Average HRV: 22ms (low)</text>
  </g>

  <!-- Smart Nudge Actions -->
  <g transform="translate(20,530)">
    <!-- Breathe -->
    <rect x="0" y="0" width="107" height="48" rx="12" fill="#0D9488"/>
    <text x="53" y="22" font-size="16" text-anchor="middle">&#x1F4A8;</text>
    <text x="53" y="38" font-size="11" font-weight="600" fill="#FFF" text-anchor="middle">Breathe</text>

    <!-- Journal -->
    <rect x="123" y="0" width="107" height="48" rx="12" fill="#3B82F6"/>
    <text x="176" y="22" font-size="16" text-anchor="middle">&#x1F4DD;</text>
    <text x="176" y="38" font-size="11" font-weight="600" fill="#FFF" text-anchor="middle">Journal</text>

    <!-- Check-in -->
    <rect x="246" y="0" width="107" height="48" rx="12" fill="#8B5CF6"/>
    <text x="299" y="22" font-size="16" text-anchor="middle">&#x1F464;</text>
    <text x="299" y="38" font-size="11" font-weight="600" fill="#FFF" text-anchor="middle">Check-in</text>
  </g>

  <!-- Annotations for buttons -->
  <g>
    <line x1="73" y1="582" x2="73" y2="598" stroke="#0D9488" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="12" y="599" width="124" height="16" rx="4" fill="#0D9488" opacity="0.1"/>
    <text x="74" y="611" font-size="8" fill="#0D9488" text-anchor="middle">&#x2192; Breathing Exercise</text>

    <line x1="196" y1="582" x2="196" y2="598" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="148" y="599" width="96" height="16" rx="4" fill="#3B82F6" opacity="0.1"/>
    <text x="196" y="611" font-size="8" fill="#3B82F6" text-anchor="middle">&#x2192; Journal Entry</text>

    <line x1="319" y1="582" x2="319" y2="598" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="268" y="599" width="104" height="16" rx="4" fill="#8B5CF6" opacity="0.1"/>
    <text x="320" y="611" font-size="8" fill="#8B5CF6" text-anchor="middle">&#x2192; Daily Check-in</text>
  </g>

  <!-- Insight Card -->
  <g transform="translate(20,628)">
    <rect width="353" height="80" rx="20" fill="#FFF"/>
    <text x="16" y="24" font-size="13" font-weight="600" fill="#000">Insight</text>
    <text x="16" y="42" font-size="12" fill="#6B7280">Your stress has been elevated for 3 consecutive</text>
    <text x="16" y="57" font-size="12" fill="#6B7280">days. Consider reducing intense activity and</text>
    <text x="16" y="72" font-size="12" fill="#6B7280">prioritizing sleep.</text>
  </g>

  <!-- Tab Bar -->
  <g transform="translate(0,776)">
    <rect width="393" height="76" fill="url(#tabBarBg)"/>
    <line x1="0" y1="0" x2="393" y2="0" stroke="#C6C6C8" stroke-width="0.5"/>

    <!-- Home -->
    <g transform="translate(39,12)" text-anchor="middle">
      <text x="0" y="0" font-size="20">&#x1F3E0;</text>
      <text x="0" y="20" font-size="10" fill="#8E8E93">Home</text>
    </g>
    <!-- Insights -->
    <g transform="translate(118,12)" text-anchor="middle">
      <text x="0" y="0" font-size="20">&#x1F4A1;</text>
      <text x="0" y="20" font-size="10" fill="#8E8E93">Insights</text>
    </g>
    <!-- Stress (selected) -->
    <g transform="translate(197,12)" text-anchor="middle">
      <text x="0" y="0" font-size="20">&#x1F9E0;</text>
      <text x="0" y="20" font-size="10" font-weight="600" fill="#FF375F">Stress</text>
    </g>
    <!-- Trends -->
    <g transform="translate(276,12)" text-anchor="middle">
      <text x="0" y="0" font-size="20">&#x1F4C8;</text>
      <text x="0" y="20" font-size="10" fill="#8E8E93">Trends</text>
    </g>
    <!-- Settings -->
    <g transform="translate(354,12)" text-anchor="middle">
      <text x="0" y="0" font-size="20">&#x2699;&#xFE0F;</text>
      <text x="0" y="20" font-size="10" fill="#8E8E93">Settings</text>
    </g>
  </g>

  <!-- Home indicator -->
  <rect x="140" y="832" width="113" height="5" rx="2.5" fill="#000"/>
</svg>