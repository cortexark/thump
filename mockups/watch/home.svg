<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 198 242" width="198" height="242">
  <defs>
    <clipPath id="watchClip">
      <rect width="198" height="242" rx="39" ry="39"/>
    </clipPath>
  </defs>
  <g clip-path="url(#watchClip)">
    <!-- Background -->
    <rect width="198" height="242" fill="#000000" rx="39" ry="39"/>

    <!-- Score Ring -->
    <circle cx="99" cy="80" r="35" fill="none" stroke="#333333" stroke-width="6"/>
    <!-- Red arc filled to 35% (35% of 360 = 126 degrees) -->
    <circle cx="99" cy="80" r="35" fill="none" stroke="#EF4444" stroke-width="6"
            stroke-dasharray="77 143" stroke-dashoffset="55"
            stroke-linecap="round" transform="rotate(-90 99 80)"/>

    <!-- Score Text -->
    <text x="99" y="94" text-anchor="middle" fill="white" font-family="-apple-system, SF Pro, Helvetica" font-size="48" font-weight="800">35</text>

    <!-- Score Meaning -->
    <text x="99" y="128" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="-apple-system, SF Pro, Helvetica" font-size="10">Let's build from here</text>

    <!-- Buddy Heart Character (worried) -->
    <g transform="translate(99, 155)">
      <!-- Heart shape -->
      <path d="M0,-8 C-4,-15 -15,-15 -15,-6 C-15,2 0,13 0,13 C0,13 15,2 15,-6 C15,-15 4,-15 0,-8Z" fill="#EF4444"/>
      <!-- Worried eyes -->
      <circle cx="-5" cy="-2" r="1.5" fill="white"/>
      <circle cx="5" cy="-2" r="1.5" fill="white"/>
      <!-- Worried mouth (wavy) -->
      <path d="M-4,4 Q-2,2 0,4 Q2,6 4,4" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    </g>

    <!-- Label below buddy -->
    <text x="99" y="180" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, SF Pro, Helvetica" font-size="9">Tap for plan</text>

    <!-- Nudge Pill -->
    <rect x="14" y="196" width="170" height="34" rx="14" ry="14" fill="rgba(255,255,255,0.1)"/>
    <!-- Rest icon -->
    <text x="28" y="218" font-size="14">&#x1F634;</text>
    <!-- "Rest" label -->
    <text x="46" y="216" fill="white" font-family="-apple-system, SF Pro, Helvetica" font-size="11" opacity="0.9">Rest</text>
    <!-- Duration -->
    <text x="78" y="216" fill="rgba(255,255,255,0.6)" font-family="-apple-system, SF Pro, Helvetica" font-size="11">15 min</text>
    <!-- START button -->
    <rect x="120" y="202" width="54" height="22" rx="11" ry="11" fill="#EF4444"/>
    <text x="147" y="217" text-anchor="middle" fill="white" font-family="-apple-system, SF Pro, Helvetica" font-size="10" font-weight="700">START</text>

    <!-- Click Annotation -->
    <text x="99" y="14" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="-apple-system, SF Pro, Helvetica" font-size="7" font-style="italic">tap → Insight Flow</text>
  </g>
</svg>