<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 198 242" width="198" height="242">
  <defs>
    <clipPath id="watchClip2">
      <rect width="198" height="242" rx="39" ry="39"/>
    </clipPath>
    <linearGradient id="stressGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#F9A8D4"/>
    </linearGradient>
    <radialGradient id="groundGlow" cx="0.5" cy="1" r="0.5">
      <stop offset="0%" stop-color="#F9A8D4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F9A8D4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#watchClip2)">
    <!-- Gradient Background -->
    <rect width="198" height="242" fill="url(#stressGrad)" rx="39" ry="39"/>

    <!-- Particle dots -->
    <circle cx="30" cy="40" r="1.5" fill="rgba(255,255,255,0.2)"/>
    <circle cx="160" cy="55" r="1" fill="rgba(255,255,255,0.2)"/>
    <circle cx="50" cy="90" r="1.2" fill="rgba(255,255,255,0.2)"/>
    <circle cx="155" cy="120" r="1.5" fill="rgba(255,255,255,0.2)"/>
    <circle cx="40" cy="160" r="1" fill="rgba(255,255,255,0.2)"/>
    <circle cx="170" cy="180" r="1.3" fill="rgba(255,255,255,0.2)"/>

    <!-- Ground glow -->
    <ellipse cx="99" cy="230" rx="90" ry="40" fill="url(#groundGlow)"/>

    <!-- Centered Buddy Heart (stressed, 82px) -->
    <g transform="translate(99, 100)">
      <!-- Heart shape -->
      <path d="M0,-18 C-10,-35 -41,-35 -41,-14 C-41,6 0,35 0,35 C0,35 41,6 41,-14 C41,-35 10,-35 0,-18Z" fill="#EF4444"/>
      <!-- Stressed eyes (X shapes) -->
      <g stroke="white" stroke-width="2.5" stroke-linecap="round">
        <line x1="-16" y1="-10" x2="-10" y2="-4"/>
        <line x1="-10" y1="-10" x2="-16" y2="-4"/>
        <line x1="10" y1="-10" x2="16" y2="-4"/>
        <line x1="16" y1="-10" x2="10" y2="-4"/>
      </g>
      <!-- Stressed mouth (zigzag) -->
      <path d="M-10,8 L-5,5 L0,10 L5,5 L10,8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Observation text -->
    <text x="99" y="158" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="-apple-system, SF Pro, Helvetica" font-size="13" font-weight="500">Your heart needs some</text>
    <text x="99" y="174" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="-apple-system, SF Pro, Helvetica" font-size="13" font-weight="500">TLC today</text>

    <!-- Suggestion text -->
    <text x="99" y="194" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, SF Pro, Helvetica" font-size="11">Try a breathing exercise</text>

    <!-- 5 indicator dots -->
    <circle cx="79" cy="218" r="3" fill="rgba(255,255,255,0.8)"/>
    <circle cx="89" cy="218" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="99" cy="218" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="109" cy="218" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="119" cy="218" r="3" fill="rgba(255,255,255,0.3)"/>

    <!-- Click Annotation -->
    <text x="99" y="14" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="-apple-system, SF Pro, Helvetica" font-size="7" font-style="italic">tap → Breathing Exercise</text>
  </g>
</svg>