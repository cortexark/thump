<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1188 242" width="1188" height="242">
  <defs>
    <clipPath id="panel1">
      <rect width="198" height="242" rx="39" ry="39"/>
    </clipPath>
    <clipPath id="panel2">
      <rect x="198" width="198" height="242"/>
    </clipPath>
    <clipPath id="panel3">
      <rect x="396" width="198" height="242"/>
    </clipPath>
    <clipPath id="panel4">
      <rect x="594" width="198" height="242"/>
    </clipPath>
    <clipPath id="panel5">
      <rect x="792" width="198" height="242"/>
    </clipPath>
    <clipPath id="panel6">
      <rect x="990" width="198" height="242"/>
    </clipPath>
  </defs>

  <!-- ===== PANEL 1: Hero ===== -->
  <g>
    <rect x="0" y="0" width="198" height="242" rx="39" ry="39" fill="#000000"/>
    <!-- Score ring -->
    <circle cx="99" cy="75" r="32" fill="none" stroke="#333" stroke-width="5"/>
    <circle cx="99" cy="75" r="32" fill="none" stroke="#EF4444" stroke-width="5"
            stroke-dasharray="70 131" stroke-dashoffset="50"
            stroke-linecap="round" transform="rotate(-90 99 75)"/>
    <text x="99" y="88" text-anchor="middle" fill="white" font-family="-apple-system, SF Pro, Helvetica" font-size="38" font-weight="800">35</text>
    <!-- Small buddy heart -->
    <g transform="translate(99, 128)">
      <path d="M0,-6 C-3,-11 -11,-11 -11,-5 C-11,1 0,10 0,10 C0,10 11,1 11,-5 C11,-11 3,-11 0,-6Z" fill="#EF4444"/>
      <circle cx="-3" cy="-1" r="1" fill="white"/>
      <circle cx="3" cy="-1" r="1" fill="white"/>
      <path d="M-3,3 Q0,1 3,3" fill="none" stroke="white" stroke-width="0.8"/>
    </g>
    <!-- Nudge text -->
    <text x="99" y="155" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="-apple-system, SF Pro, Helvetica" font-size="12" font-weight="600">Rest up</text>
    <text x="99" y="172" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="-apple-system, SF Pro, Helvetica" font-size="10">Your body needs recovery</text>
    <!-- Page dots -->
    <circle cx="79" cy="222" r="3" fill="white"/>
    <circle cx="89" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="99" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="109" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="119" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="129" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Divider -->
  <line x1="198" y1="20" x2="198" y2="222" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ===== PANEL 2: Readiness ===== -->
  <g>
    <rect x="198" y="0" width="198" height="242" fill="#000000"/>
    <text x="297" y="38" text-anchor="middle" fill="white" font-family="-apple-system, SF Pro, Helvetica" font-size="14" font-weight="700">Readiness</text>
    <!-- Pillar bars -->
    <!-- Sleep 35% -->
    <text x="218" y="68" fill="rgba(255,255,255,0.6)" font-family="-apple-system, SF Pro, Helvetica" font-size="9">Sleep</text>
    <rect x="268" y="58" width="110" height="10" rx="5" fill="#333"/>
    <rect x="268" y="58" width="38" height="10" rx="5" fill="#EF4444"/>
    <text x="382" y="68" fill="rgba(255,255,255,0.5)" font-family="-apple-system, SF Pro, Helvetica" font-size="8">35%</text>

    <!-- Recovery 30% -->
    <text x="218" y="92" fill="rgba(255,255,255,0.6)" font-family="-apple-system, SF Pro, Helvetica" font-size="9">Recovery</text>
    <rect x="268" y="82" width="110" height="10" rx="5" fill="#333"/>
    <rect x="268" y="82" width="33" height="10" rx="5" fill="#EF4444"/>
    <text x="382" y="92" fill="rgba(255,255,255,0.5)" font-family="-apple-system, SF Pro, Helvetica" font-size="8">30%</text>

    <!-- Stress 25% -->
    <text x="218" y="116" fill="rgba(255,255,255,0.6)" font-family="-apple-system, SF Pro, Helvetica" font-size="9">Stress</text>
    <rect x="268" y="106" width="110" height="10" rx="5" fill="#333"/>
    <rect x="268" y="106" width="28" height="10" rx="5" fill="#EF4444"/>
    <text x="382" y="116" fill="rgba(255,255,255,0.5)" font-family="-apple-system, SF Pro, Helvetica" font-size="8">25%</text>

    <!-- Activity 45% -->
    <text x="218" y="140" fill="rgba(255,255,255,0.6)" font-family="-apple-system, SF Pro, Helvetica" font-size="9">Activity</text>
    <rect x="268" y="130" width="110" height="10" rx="5" fill="#333"/>
    <rect x="268" y="130" width="50" height="10" rx="5" fill="#F59E0B"/>
    <text x="382" y="140" fill="rgba(255,255,255,0.5)" font-family="-apple-system, SF Pro, Helvetica" font-size="8">45%</text>

    <!-- HRV 30% -->
    <text x="218" y="164" fill="rgba(255,255,255,0.6)" font-family="-apple-system, SF Pro, Helvetica" font-size="9">HRV</text>
    <rect x="268" y="154" width="110" height="10" rx="5" fill="#333"/>
    <rect x="268" y="154" width="33" height="10" rx="5" fill="#EF4444"/>
    <text x="382" y="164" fill="rgba(255,255,255,0.5)" font-family="-apple-system, SF Pro, Helvetica" font-size="8">30%</text>

    <!-- Page dots -->
    <circle cx="277" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="287" cy="222" r="3" fill="white"/>
    <circle cx="297" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="307" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="317" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="327" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Divider -->
  <line x1="396" y1="20" x2="396" y2="222" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ===== PANEL 3: Walk ===== -->
  <g>
    <rect x="396" y="0" width="198" height="242" fill="#000000"/>
    <text x="495" y="55" text-anchor="middle" font-size="32">&#x1F6B6;</text>
    <text x="495" y="100" text-anchor="middle" fill="white" font-family="-apple-system, SF Pro, Helvetica" font-size="28" font-weight="700">2,340</text>
    <text x="495" y="118" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="-apple-system, SF Pro, Helvetica" font-size="11">steps</text>
    <text x="495" y="142" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="-apple-system, SF Pro, Helvetica" font-size="10">Goal: 8,000</text>
    <!-- Progress bar -->
    <rect x="435" y="150" width="120" height="4" rx="2" fill="#333"/>
    <rect x="435" y="150" width="35" height="4" rx="2" fill="#EF4444"/>
    <!-- START button -->
    <rect x="445" y="170" width="100" height="30" rx="15" fill="#333"/>
    <text x="495" y="190" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="-apple-system, SF Pro, Helvetica" font-size="12" font-weight="600">START</text>
    <!-- Page dots -->
    <circle cx="475" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="485" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="495" cy="222" r="3" fill="white"/>
    <circle cx="505" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="515" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="525" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Divider -->
  <line x1="594" y1="20" x2="594" y2="222" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ===== PANEL 4: Stress ===== -->
  <g>
    <rect x="594" y="0" width="198" height="242" fill="#000000"/>
    <text x="693" y="50" text-anchor="middle" font-size="32">&#x1F630;</text>
    <!-- Heatmap dots -->
    <circle cx="663" cy="80" r="8" fill="#EF4444"/>
    <circle cx="683" cy="80" r="8" fill="#F59E0B"/>
    <circle cx="703" cy="80" r="8" fill="#EF4444"/>
    <circle cx="723" cy="80" r="8" fill="#EF4444"/>
    <circle cx="673" cy="100" r="8" fill="#F59E0B"/>
    <circle cx="693" cy="100" r="8" fill="#EF4444"/>
    <!-- Label -->
    <text x="693" y="130" text-anchor="middle" fill="#EF4444" font-family="-apple-system, SF Pro, Helvetica" font-size="16" font-weight="700">Elevated</text>
    <text x="693" y="148" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, SF Pro, Helvetica" font-size="10">Stress has been high today</text>
    <!-- Breathe button -->
    <rect x="643" y="162" width="100" height="30" rx="15" fill="#0D9488"/>
    <text x="693" y="182" text-anchor="middle" fill="white" font-family="-apple-system, SF Pro, Helvetica" font-size="12" font-weight="600">Breathe</text>
    <!-- Page dots -->
    <circle cx="673" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="683" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="693" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="703" cy="222" r="3" fill="white"/>
    <circle cx="713" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="723" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Divider -->
  <line x1="792" y1="20" x2="792" y2="222" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ===== PANEL 5: Sleep ===== -->
  <g>
    <rect x="792" y="0" width="198" height="242" fill="#000000"/>
    <text x="891" y="50" text-anchor="middle" font-size="28">&#x1F319;</text>
    <text x="891" y="95" text-anchor="middle" fill="white" font-family="-apple-system, SF Pro, Helvetica" font-size="32" font-weight="700">5.2 hrs</text>
    <!-- Quality -->
    <text x="891" y="120" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="-apple-system, SF Pro, Helvetica" font-size="11">Quality:</text>
    <text x="891" y="138" text-anchor="middle" fill="#EF4444" font-family="-apple-system, SF Pro, Helvetica" font-size="14" font-weight="700">Poor</text>
    <!-- Trend arrow down -->
    <g transform="translate(891, 162)">
      <polygon points="0,8 -6,-4 -2,-4 -2,-10 2,-10 2,-4 6,-4" fill="#EF4444"/>
    </g>
    <text x="891" y="185" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="-apple-system, SF Pro, Helvetica" font-size="9">Trending down</text>
    <!-- Page dots -->
    <circle cx="871" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="881" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="891" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="901" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="911" cy="222" r="3" fill="white"/>
    <circle cx="921" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Divider -->
  <line x1="990" y1="20" x2="990" y2="222" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ===== PANEL 6: Trends ===== -->
  <g>
    <rect x="990" y="0" width="198" height="242" fill="#000000"/>
    <!-- Labels -->
    <text x="1050" y="38" fill="#EF4444" font-family="-apple-system, SF Pro, Helvetica" font-size="12" font-weight="700">HRV &#x2193;</text>
    <text x="1120" y="38" fill="#EF4444" font-family="-apple-system, SF Pro, Helvetica" font-size="12" font-weight="700">RHR &#x2191;</text>
    <!-- Mini sparkline (trending bad) -->
    <polyline points="1020,80 1035,75 1050,82 1065,90 1080,95 1095,105 1110,115 1125,125 1140,135 1155,142"
              fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sparkline area -->
    <polygon points="1020,80 1035,75 1050,82 1065,90 1080,95 1095,105 1110,115 1125,125 1140,135 1155,142 1155,150 1020,150"
              fill="rgba(167,139,250,0.15)"/>
    <!-- Axis line -->
    <line x1="1020" y1="150" x2="1160" y2="150" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Streak -->
    <text x="1089" y="172" text-anchor="middle" font-size="14">&#x1F525;</text>
    <text x="1089" y="188" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="-apple-system, SF Pro, Helvetica" font-size="11" font-weight="600">3 day streak</text>
    <!-- Recovery label -->
    <text x="1089" y="205" text-anchor="middle" fill="#EF4444" font-family="-apple-system, SF Pro, Helvetica" font-size="10" font-weight="600">Recovery needed</text>
    <!-- Page dots -->
    <circle cx="1069" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="1079" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="1089" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="1099" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="1109" cy="222" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="1119" cy="222" r="3" fill="white"/>
  </g>
</svg>